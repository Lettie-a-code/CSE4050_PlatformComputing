<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Input form</title>
    <script>
        function validateForm() {
            let form = document.forms["myForm"];
            let fields = ["fname", "lname", "email", "phone"];

            for (let i = 0; i < fields.length; i++) {
                let field = form[fields[i]];
                if (field.value === "") {
                    alert(field.name + " must be filled out");
                    return false;
                }
            }
            return true; 
        }
    </script>
</head >
<body>
    <!--Run validateForm() when submitted.-->
    <form name="myForm" onsubmit="return validateForm()">

        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="fname"><br><br>

        <label for="lname">Lsst name:</label><br>
        <input type="text" id="lname" name="lname"><br><br>

        <label for="dob">DOB:</label>
        <input type="date" id="dob" name="dob"><br><br>

        <label for="email">Email address:</label>
        <input type="text" id="email" name="email"><br><br>

        <label for="phone">
            Phone number:<br>
            <small>Format: 123-456-7890</small>
        </label>
        <input type="tel" id="phone" name="phone"
               pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" required>
        <br><br>

        <label for="country">Selected countries</label>
        <select id="country" name="country" required>
            <option>Brazil</option>
            <option>Ecuador</option>
            <option>Peru</option>
            <option>Uruguay</option>
        </select>
        <br><br>

        <!--Use label tag to keep gender on one line-->
        <label>Gender:</label>
        <!--Add required to one radio in the group-->
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br><br />

        <input type="submit" value="Submit">

        <!--Use built in html reset to clear fields-->
        <button type="reset">Cancel</button>
    </form>

</body>
 </html>
